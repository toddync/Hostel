<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login - Albergue Santa Teresa</title>
		<link
			rel="stylesheet"
			href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
		<link rel="stylesheet" href="../css/index.css" />
	</head>
	<body>
		<!-- Navbar -->
		<nav class="navbar navbar-expand-lg navbar-dark">
			<a class="navbar-brand" href="index.html">Albergue Santa Teresa</a>
			<button
				class="navbar-toggler"
				type="button"
				data-toggle="collapse"
				data-target="#navbarNav"
				aria-controls="navbarNav"
				aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ml-auto">
					<li class="nav-item">
						<a class="nav-link" href="index.html">Início</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="disponibilidade.html"
							>Consultar Disponibilidade</a
						>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="login.html">Login</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="cadastro.html">Cadastro</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="area_usuario.html"
							>Área do Usuário</a
						>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="area_administrativa.html"
							>Área Administrativa</a
						>
					</li>
				</ul>
			</div>
		</nav>

		<!-- Login Form -->
		<div class="login-container">
			<h2>Login</h2>
			<form action="autenticar_usuario.html" method="POST">
				<div class="form-group">
					<label for="email">E-mail</label>
					<input
						type="email"
						class="form-control"
						id="email"
						name="email"
						placeholder="Digite seu e-mail"
						required />
				</div>
				<div class="form-group">
					<label for="senha">Senha</label>
					<input
						type="password"
						class="form-control"
						id="senha"
						name="senha"
						placeholder="Digite sua senha"
						required />
				</div>
				<button type="submit" class="btn btn-primary btn-block">
					Entrar
				</button>
			</form>
			<p class="mt-3 text-center">
				Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
			</p>
		</div>

		<!-- Footer -->
		<footer class="ab-footer">
			<p>
				&copy; 2024 Albergue Santa Teresa. Todos os direitos reservados.
			</p>
		</footer>

		<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
	</body>
</html>
